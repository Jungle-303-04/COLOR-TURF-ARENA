apiVersion: v1
kind: ConfigMap
metadata:
  name: paint-arena-config
data:
  APP_VERSION: "v1.1.3"
  SERVER_VERSION: "v1.1.3"
  GIT_SHA: "local"
  CLUSTER_NAME: primary
  RELEASE_CHANNEL: stable
  BROADCAST_MODE: delta
  SNAPSHOT_INTERVAL_MS: "1000"
  ADMIN_TOKEN: demo-admin
  OPS_EVENT_TOKEN: demo-ops
  IMAGE_TAG: "paint-arena-game-api:1.0.0"
  PUBLIC_BASE_URL: "http://localhost:30080"
  KUBERNETES_LABEL_SELECTOR: "app.kubernetes.io/name=paint-arena-game-api"
  KUBERNETES_DEPLOYMENT_NAME: "paint-arena-game-api"
