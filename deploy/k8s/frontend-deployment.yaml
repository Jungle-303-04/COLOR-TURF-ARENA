apiVersion: apps/v1
kind: Deployment
metadata:
  name: paint-arena-frontend
  labels:
    app.kubernetes.io/name: paint-arena-frontend
    app.kubernetes.io/part-of: paint-arena-ops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: paint-arena-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paint-arena-frontend
        app.kubernetes.io/part-of: paint-arena-ops
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: paint-arena-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
