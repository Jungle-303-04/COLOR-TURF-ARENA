apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "color-turf.fullname" . }}-server-stable
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
    app.kubernetes.io/component: game-server
    app.kubernetes.io/version: {{ .Values.server.version | quote }}
    color-turf/release-channel: stable
    color-turf/cluster-role: {{ .Values.server.clusterName | quote }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: game-server
      color-turf/release-channel: stable
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "color-turf.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: game-server
        app.kubernetes.io/version: {{ .Values.server.version | quote }}
        color-turf/release-channel: stable
        color-turf/cluster-role: {{ .Values.server.clusterName | quote }}
    spec:
      priorityClassName: {{ .Values.priorityClass.name }}
      serviceAccountName: {{ include "color-turf.fullname" . }}
      terminationGracePeriodSeconds: 20
      securityContext:
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: {{ include "color-turf.serverImage" . | quote }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 3001 }
          envFrom:
            - configMapRef: { name: {{ include "color-turf.fullname" . }}-config }
            - secretRef: { name: {{ include "color-turf.authSecretName" . }} }
          env:
            - { name: SERVER_VERSION, value: {{ .Values.server.version | quote }} }
            - { name: RELEASE_CHANNEL, value: stable }
            - { name: BROADCAST_MODE, value: {{ .Values.server.broadcastMode | quote }} }
            - { name: DEMO_TICK_DELAY_MS, value: {{ .Values.server.tickDelayMs | quote }} }
            {{- if and .Values.canary.enabled (ne .Values.server.clusterName "dr") }}
            - { name: CANARY_API_URL, value: "http://server-canary:3001" }
            - { name: PARTITION_ROOMS_BY_RELEASE, value: "true" }
            {{- end }}
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 1
          lifecycle:
            preStop:
              exec: { command: ["sh", "-c", "sleep 5"] }
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.server.containerSecurityContext | nindent 12 }}
