{{- if .Values.bot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "color-turf.fullname" . }}-bot
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
    app.kubernetes.io/component: bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "color-turf.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: bot
        color-turf/release-channel: stable
        color-turf/cluster-role: {{ .Values.server.clusterName | quote }}
    spec:
      containers:
        - name: bot
          image: "{{ .Values.bot.image.repository }}:{{ .Values.bot.image.tag }}"
          args: ["--room", {{ required "bot.room is required when bot.enabled=true" .Values.bot.room | quote }}, "--count", {{ .Values.bot.count | quote }}, "--server", "http://server-stable:3001"]
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 300m, memory: 128Mi }
{{- end }}
