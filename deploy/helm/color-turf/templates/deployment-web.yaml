apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "color-turf.fullname" . }}-web
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "color-turf.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
        app.kubernetes.io/version: {{ .Values.server.version | quote }}
        color-turf/release-channel: stable
        color-turf/cluster-role: {{ .Values.server.clusterName | quote }}
    spec:
      priorityClassName: {{ .Values.priorityClass.name }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "color-turf.webImage" . | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 8080 }
          livenessProbe:
            httpGet: { path: /, port: http }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 1
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.web.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - { name: nginx-cache, mountPath: /var/cache/nginx }
            - { name: nginx-run, mountPath: /run }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: nginx-cache, emptyDir: {} }
        - { name: nginx-run, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
