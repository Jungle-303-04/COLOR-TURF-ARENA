{{- if .Values.auth.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "color-turf.fullname" . }}-auth
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_TOKEN: {{ required "auth.adminToken is required when auth.create=true" .Values.auth.adminToken | quote }}
  OPS_EVENT_TOKEN: {{ required "auth.opsEventToken is required when auth.create=true" .Values.auth.opsEventToken | quote }}
  OPS_PLATFORM_WEBHOOK_URL: {{ .Values.auth.opsPlatformWebhookUrl | quote }}
  OPS_PLATFORM_WEBHOOK_TOKEN: {{ .Values.auth.opsPlatformWebhookToken | quote }}
{{- end }}
