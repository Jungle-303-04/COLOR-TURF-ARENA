apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "color-turf.fullname" . }}-config
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
data:
  PUBLIC_BASE_URL: {{ .Values.server.publicBaseUrl | quote }}
  BOT_GATEWAY_URL: {{ .Values.server.botGatewayUrl | default "http://server-stable:3001" | quote }}
  REDIS_URL: {{ .Values.server.redisUrl | quote }}
  SNAPSHOT_INTERVAL_MS: {{ .Values.server.snapshotIntervalMs | quote }}
  GIT_SHA: {{ .Values.server.gitSha | quote }}
  CLUSTER_NAME: {{ .Values.server.clusterName | quote }}
