apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "color-turf.fullname" . }}-observer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "color-turf.fullname" . }}-observer
subjects:
  - kind: ServiceAccount
    name: {{ include "color-turf.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "color-turf.fullname" . }}-observer
