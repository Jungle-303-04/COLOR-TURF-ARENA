{{- if .Values.imagePrePull.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "color-turf.fullname" . }}-image-prepull
  labels:
    {{- include "color-turf.labels" . | nindent 4 }}
    app.kubernetes.io/component: image-prepull
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: image-prepull
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "color-turf.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: image-prepull
    spec:
      priorityClassName: {{ .Values.priorityClass.name }}
      terminationGracePeriodSeconds: 1
      containers:
        - name: server-image
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command: ["sh", "-c", "sleep 2147483647"]
          resources:
            requests: { cpu: 1m, memory: 2Mi }
            limits: { cpu: 10m, memory: 16Mi }
        - name: web-image
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command: ["sh", "-c", "sleep 2147483647"]
          resources:
            requests: { cpu: 1m, memory: 2Mi }
            limits: { cpu: 10m, memory: 16Mi }
{{- end }}
