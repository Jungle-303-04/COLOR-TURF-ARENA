nameOverride: ""
fullnameOverride: ""

server:
  image:
    repository: 183548421506.dkr.ecr.ap-northeast-2.amazonaws.com/color-turf-game-server
    tag: demo-20260715-1
    digest: ""
    pullPolicy: IfNotPresent
  replicas: 2
  version: v1.1.3
  gitSha: local
  clusterName: primary
  releaseChannel: stable
  broadcastMode: delta
  tickDelayMs: 0
  snapshotIntervalMs: 1000
  redisUrl: redis://redis:6379
  publicBaseUrl: ""
  singleUseGame: false
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 2000m, memory: 512Mi }
  # The game-server image creates app as UID 100 / GID 101.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

canary:
  enabled: false
  replicas: 1
  version: v1.2.0
  broadcastMode: full
  tickDelayMs: 250

web:
  image:
    repository: 183548421506.dkr.ecr.ap-northeast-2.amazonaws.com/color-turf-web
    tag: demo-20260715-1
    digest: ""
    pullPolicy: IfNotPresent
  # One reverse proxy keeps every connection for a room on the same
  # lease-owning game server. Game-server availability remains independent.
  replicas: 1
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }
  # nginx:alpine defines nginx as UID/GID 101. Writable runtime paths are
  # supplied as emptyDir volumes by the Deployment.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

gateway:
  dr:
    # Empty means a single-cluster fallback Service that selects the stable
    # game-server Pods. Set a resolvable DNS name when a real DR endpoint is
    # reachable from this cluster on port 3001.
    externalName: ""

redis:
  install: true
  image: redis:8.2-alpine
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }
  # redis:8.2-alpine defines redis as UID 999 / GID 1000.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  persistence:
    enabled: false
    size: 1Gi

bot:
  enabled: false
  image:
    repository: color-turf-bot
    tag: local
  room: ""
  count: 20
  # node:alpine defines node as UID/GID 1000.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

auth:
  create: false
  demoAdminAuthDisabled: false
  existingSecret: color-turf-auth
  adminToken: ""
  opsEventToken: ""
  opsPlatformWebhookUrl: ""
  opsPlatformWebhookToken: ""

chaos:
  # This is fail-closed because it intentionally makes one game-server
  # container exceed its cgroup memory limit. Enable only for the demo target.
  allowPodOom: false
  # This permits the token-protected Demo / Chaos API to terminate the serving
  # game-server process. Keep false outside an isolated, self-healing demo.
  allowServerShutdown: false
  oomLeakChunkMiB: 4
  oomLeakIntervalMs: 250

opsiaRecovery:
  # Grants the registered Opsia target agent only the Deployment permissions
  # required for an operator-approved rollout restart in this namespace.
  enabled: false
  agentServiceAccount:
    name: cluster-agent
    namespace: target

service:
  type: LoadBalancer
  webPort: 80
  nodePort: null

ingress:
  enabled: false
  className: ""
  host: color-turf.local

serviceMonitor:
  enabled: false
  interval: 5s

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  scaleUp:
    stabilizationWindowSeconds: 0
  scaleDown:
    stabilizationWindowSeconds: 60

priorityClass:
  create: true
  name: color-turf-demo-fast
  value: 90000

imagePrePull:
  enabled: true

cloudflare:
  enabled: false
  tunnelId: ""
  hostname: ""
  credentialsSecret: color-turf-cloudflare-credentials
  replicas: 2
  image: cloudflare/cloudflared:2026.6.1
  resources:
    requests: { cpu: 20m, memory: 32Mi }
    limits: { cpu: 100m, memory: 96Mi }
