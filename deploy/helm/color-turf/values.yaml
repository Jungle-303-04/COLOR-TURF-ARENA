nameOverride: ""
fullnameOverride: ""

server:
  image:
    repository: 183548421506.dkr.ecr.ap-northeast-2.amazonaws.com/color-turf-game-server
    tag: demo-20260715-1
    pullPolicy: IfNotPresent
  replicas: 2
  version: v1.1.3
  gitSha: local
  clusterName: primary
  releaseChannel: stable
  broadcastMode: delta
  tickDelayMs: 0
  snapshotIntervalMs: 1000
  redisUrl: redis://redis:6379
  publicBaseUrl: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

canary:
  enabled: false
  replicas: 1
  version: v1.2.0
  broadcastMode: full
  tickDelayMs: 250

web:
  image:
    repository: 183548421506.dkr.ecr.ap-northeast-2.amazonaws.com/color-turf-web
    tag: demo-20260715-1
    pullPolicy: IfNotPresent
  # One reverse proxy keeps every connection for a room on the same
  # lease-owning game server. Game-server availability remains independent.
  replicas: 1
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

redis:
  install: true
  image: redis:8.2-alpine
  persistence:
    enabled: false
    size: 1Gi

bot:
  enabled: false
  image:
    repository: color-turf-bot
    tag: local
  room: ""
  count: 20

auth:
  create: false
  existingSecret: color-turf-auth
  adminToken: ""
  opsEventToken: ""
  opsPlatformWebhookUrl: ""
  opsPlatformWebhookToken: ""

service:
  type: LoadBalancer
  webPort: 80
  nodePort: null

ingress:
  enabled: false
  className: ""
  host: color-turf.local

serviceMonitor:
  enabled: false
  interval: 5s

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  scaleUp:
    stabilizationWindowSeconds: 0
  scaleDown:
    stabilizationWindowSeconds: 60

priorityClass:
  create: true
  name: color-turf-demo-fast
  value: 90000

imagePrePull:
  enabled: true
