# DANGEROUS: use only in an isolated, disposable demo namespace with no public
# ingress, tunnel, or untrusted network access. This file intentionally removes
# admin authentication and permits requests that OOM-kill or gracefully stop a
# game-server Pod. Kubernetes must be able to restart the terminated container.
server:
  publicBaseUrl: ""

auth:
  demoAdminAuthDisabled: true

chaos:
  allowPodOom: true
  allowServerShutdown: true

service:
  type: ClusterIP
  nodePort: null

ingress:
  enabled: false

cloudflare:
  enabled: false
