name: color-turf-arena

x-server-environment: &server-environment
  PORT: "3001"
  HOST: 0.0.0.0
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
  REDIS_URL: redis://redis:6379
  SNAPSHOT_INTERVAL_MS: ${SNAPSHOT_INTERVAL_MS:-1000}
  ADMIN_TOKEN: ${ADMIN_TOKEN:-demo-admin}
  OPS_EVENT_TOKEN: ${OPS_EVENT_TOKEN:-demo-ops}
  OPS_PLATFORM_WEBHOOK_URL: ${OPS_PLATFORM_WEBHOOK_URL:-}
  OPS_PLATFORM_WEBHOOK_TOKEN: ${OPS_PLATFORM_WEBHOOK_TOKEN:-}
  GIT_SHA: ${GIT_SHA:-local}
  CANARY_SERVER_VERSION: ${CANARY_SERVER_VERSION:-v1.2.0}
  DEMO_AUTO_SEED: ${DEMO_AUTO_SEED:-false}
  DEMO_BOT_COUNT: ${DEMO_BOT_COUNT:-0}

x-server-base: &server-base
  build:
    context: .
    dockerfile: services/game-api/Dockerfile
  image: color-turf-game-server:${IMAGE_TAG:-local}
  depends_on:
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
    interval: 5s
    timeout: 3s
    retries: 12
    start_period: 8s
  stop_grace_period: 20s
  restart: unless-stopped

services:
  redis:
    image: redis:8.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "1", "1"]
    volumes:
      - color-turf-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 15
    restart: unless-stopped

  server-stable:
    <<: *server-base
    environment:
      <<: *server-environment
      SERVER_VERSION: ${SERVER_VERSION:-v1.1.3}
      CLUSTER_NAME: primary
      RELEASE_CHANNEL: stable
      BROADCAST_MODE: delta
      POD_NAME: compose-stable-primary
      IMAGE_TAG: color-turf-game-server:${IMAGE_TAG:-local}
    ports:
      - "3001:3001"

  server-canary:
    <<: *server-base
    profiles: ["topology"]
    environment:
      <<: *server-environment
      SERVER_VERSION: ${CANARY_SERVER_VERSION:-v1.2.0}
      CLUSTER_NAME: primary
      RELEASE_CHANNEL: canary
      BROADCAST_MODE: full
      DEMO_TICK_DELAY_MS: ${CANARY_TICK_DELAY_MS:-250}
      POD_NAME: compose-canary-primary
      IMAGE_TAG: color-turf-game-server:${IMAGE_TAG:-local}
      DEMO_AUTO_SEED: "false"
    ports:
      - "3002:3001"

  server-dr:
    <<: *server-base
    depends_on:
      redis:
        condition: service_healthy
      server-stable:
        condition: service_healthy
    environment:
      <<: *server-environment
      SERVER_VERSION: ${SERVER_VERSION:-v1.1.3}
      CLUSTER_NAME: dr
      RELEASE_CHANNEL: stable
      BROADCAST_MODE: delta
      POD_NAME: compose-stable-dr
      IMAGE_TAG: color-turf-game-server:${IMAGE_TAG:-local}
      DEMO_AUTO_SEED: "false"
    ports:
      - "3003:3001"

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: color-turf-web:${IMAGE_TAG:-local}
    depends_on:
      server-stable:
        condition: service_healthy
      server-dr:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/admin"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bot:
    profiles: ["load"]
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    image: color-turf-bot:${IMAGE_TAG:-local}
    environment:
      BOT_SERVER_URL: http://server-stable:3001
      BOT_ROOM: ${BOT_ROOM:-}
      BOT_COUNT: ${BOT_COUNT:-20}
    depends_on:
      server-stable:
        condition: service_healthy
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=2h"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      server-stable:
        condition: service_healthy

volumes:
  color-turf-redis:
