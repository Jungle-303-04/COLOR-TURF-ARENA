name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify application and deployment assets
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright Chromium E2E
        run: npm run test:e2e

      - name: Compare stable and Canary load
        run: npm run load:compare

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Lint Helm chart
        run: |
          helm lint deploy/helm/color-turf
          helm lint deploy/helm/color-turf -f deploy/helm/color-turf/values-primary.yaml
          helm lint deploy/helm/color-turf -f deploy/helm/color-turf/values-dr.yaml

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.3

      - name: Render Kustomize manifests
        run: kubectl kustomize deploy/k8s > /dev/null

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
