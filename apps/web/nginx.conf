upstream game_api {
  zone game_api 64k;
  server server-stable:3001 max_fails=1 fail_timeout=1s;
  server server-dr:3001 backup;
  keepalive 32;
}

upstream game_api_canary {
  zone game_api_canary 64k;
  server server-canary:3001 max_fails=1 fail_timeout=1s;
  keepalive 16;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy same-origin always;

  location /socket/canary/ {
    proxy_pass http://game_api_canary;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_read_timeout 75s;
  }

  location /socket.io/ {
    proxy_pass http://game_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_read_timeout 75s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  location ~ ^/(api|healthz|readyz|version|metrics) {
    proxy_pass http://game_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 1s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
